# CAMARA Validation Framework — Caller Workflow
#
# Installed in API repositories by the CAMARA onboarding campaign
# (camaraproject/project-administration). No modification needed;
# all configuration is centralized in camaraproject/tooling.
#
# Replaces the legacy pr_validation_caller.yml (v0 validation).

name: CAMARA Validation

on:
  pull_request:
    branches:
      - main
      - release-snapshot/**
      - maintenance/**
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  checks: write
  pull-requests: write
  issues: write
  contents: read
  statuses: write
  id-token: write

jobs:
  validation:
    # Temporary pin to the tooling S-037 hotfix (camaraproject/tooling#284).
    # Revert to @v1-rc + drop the with: block once @v1-rc advances past this SHA.
    uses: camaraproject/tooling/.github/workflows/validation.yml@2a6dc66c4cabc48716c165a612a13985d93a5bf4
    with:
      tooling_ref_override: "2a6dc66c4cabc48716c165a612a13985d93a5bf4"
    secrets: inherit
